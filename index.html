```html
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>1945 인물 테스트</title>

<link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700;800&family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<style>
body { font-family:'Noto Sans KR'; background:#f5f5f0; }
.serif { font-family:'Nanum Myeongjo'; }

.result-img-wrap img { filter:grayscale(100%); transition:0.8s; }
.result-img-wrap.active img { filter:grayscale(0%); transform:scale(1.03); }

#thumb {
position:fixed; left:-9999px;
width:1080px; height:1080px;
background:#fdfdfb; padding:60px;
font-family:'Nanum Myeongjo';
}
</style>
</head>

<body class="flex items-center justify-center min-h-screen p-4">

<div class="max-w-md w-full bg-white p-6 shadow-xl text-center">

<!-- 시작 -->
<div id="start">
<h1 class="serif text-4xl mb-4">1945</h1>
<button onclick="startQuiz()" class="bg-red-900 text-white w-full py-3">
테스트 시작
</button>
</div>

<!-- 질문 -->
<div id="quiz" class="hidden">
<h2 id="question" class="mb-6"></h2>
<div id="answers"></div>
</div>

<!-- 결과 -->
<div id="result" class="hidden">

<h1 id="result-title" class="serif text-2xl mb-4"></h1>

<div class="result-img-wrap mb-4" id="imgWrap">
<img id="result-img" class="w-full">
</div>

<p id="result-desc" class="mb-4 text-sm"></p>

<div id="result-stats" class="text-left mb-4"></div>

<!-- CTA -->
<div class="border-t pt-4 mt-4">
<p class="cta-text text-sm text-stone-500 mb-3"></p>

<a href="https://forms.gle/hQindGxBDH64uSWC8?utm_source=1945_test" target="_blank"
class="block w-full py-3 bg-red-900 text-white font-bold mb-2">
🎟 공연 예매하러 가기
</a>
</div>

<button onclick="downloadShare()" class="bg-black text-white w-full py-2 mt-2">
결과 이미지 저장
</button>

<button onclick="generateThumbnail()" class="bg-red-900 text-white w-full py-2 mt-2">
인스타 썸네일 생성
</button>

</div>

</div>

<!-- 공유 -->
<div id="share-card" class="hidden bg-white p-4 text-center">
<h2 id="share-title"></h2>
<img id="share-img" class="w-full">
<p id="share-desc"></p>
</div>

<!-- 썸네일 -->
<div id="thumb">
<h1 id="thumb-title" style="font-size:64px;"></h1>
<img id="thumb-img" style="width:100%; margin:40px 0;">
<p id="thumb-desc" style="font-size:28px;"></p>
<p style="margin-top:20px;">당신은 어떤 선택을 할 것인가</p>
</div>

<script>

// 질문
const questions = [
{q:"낯선 곳",a:[{t:"생존",p:"만철"},{t:"질서",p:"최주임"},{t:"가족",p:"순남"},{t:"관망",p:"미즈코"}]},
{q:"문제 발생",a:[{t:"제압",p:"보안대원"},{t:"대화",p:"원창"},{t:"계산",p:"선녀"},{t:"도움",p:"훈이"}]},
{q:"가치",a:[{t:"생존",p:"끝순"},{t:"신념",p:"영호"},{t:"가족",p:"이노인"},{t:"보호",p:"명숙"}]},
{q:"의심",a:[{t:"논리",p:"원창"},{t:"위협",p:"장씨"},{t:"침묵",p:"미즈코"},{t:"이용",p:"선녀"}]},
{q:"기차",a:[{t:"선점",p:"만철"},{t:"배려",p:"명숙"},{t:"가족",p:"순남"},{t:"타이밍",p:"최주임"}]},
{q:"아이들",a:[{t:"돌봄",p:"숙이"},{t:"먹을것",p:"옥이"},{t:"회피",p:"끝순"},{t:"무시",p:"장씨"}]},
{q:"과거",a:[{t:"외면",p:"유코"},{t:"버팀",p:"이노인"},{t:"보호",p:"명숙"},{t:"생존",p:"만철"}]},
{q:"선택",a:[{t:"희생",p:"원창"},{t:"자기",p:"선녀"},{t:"의리",p:"훈이"},{t:"고민",p:"영호"}]}
];

// 결과 (초기 이미지 링크 그대로)
const results = {
"원창":{t:"원창형 인간",d:"공동체를 이끄는 리더",i:"http://bit.ly/4cAsD2w"},
"순남":{t:"순남형 인간",d:"가족을 지키는 사람",i:"https://bit.ly/4mSnRAD"},
"명숙":{t:"명숙형 인간",d:"누군가를 지키는 사람",i:"https://bit.ly/4tJEmlh"},
"미즈코":{t:"미즈코형 인간",d:"경계에 선 사람",i:"https://bit.ly/4ebjfU1"},
"만철":{t:"만철형 인간",d:"생존 전략가",i:"https://bit.ly/4eJ3sfh"},
"끝순":{t:"끝순형 인간",d:"버티는 사람",i:"https://zrr.kr/kACTvt"},
"선녀":{t:"선녀형 인간",d:"현실적인 선택",i:"https://zrr.kr/IuV4ns"},
"장씨":{t:"장씨형 인간",d:"강압적 질서",i:"https://zrr.kr/v67C5W"},
"이노인":{t:"이노인형 인간",d:"버팀목",i:"https://zrr.kr/GzTyOG"},
"숙이":{t:"숙이형 인간",d:"희망",i:"https://zrr.kr/DICZ7E"},
"옥이":{t:"옥이형 인간",d:"순수",i:"https://zrr.kr/HVl6HJ"},
"훈이":{t:"훈이형 인간",d:"의리",i:"https://zrr.kr/QNJdTt"},
"영호":{t:"영호형 인간",d:"고뇌",i:"https://zrr.kr/kT1d1l"},
"최주임":{t:"최주임형 인간",d:"관리자",i:"https://zrr.kr/dqWJwu"},
"보안대원":{t:"질서형 인간",d:"규율 유지",i:"https://zrr.kr/dqWJwu"},
"유코":{t:"유코형 인간",d:"상처",i:"https://zrr.kr/J8OoHI"}
};

let i=0, scores={};

function startQuiz(){
start.style.display='none';
quiz.style.display='block';
showQ();
}

function showQ(){
const q=questions[i];
question.innerText=q.q;
answers.innerHTML="";
q.a.forEach(a=>{
const b=document.createElement('button');
b.className="block w-full border p-3 mb-2";
b.innerText=a.t;
b.onclick=()=>next(a.p);
answers.appendChild(b);
});
}

function next(p){
scores[p]=(scores[p]||0)+1;
i++;
i<questions.length?showQ():showResult();
}

function showResult(){
quiz.style.display='none';
result.style.display='block';

const max=Math.max(...Object.values(scores));
const c=Object.keys(scores).filter(k=>scores[k]===max);
const winner=c[Math.floor(Math.random()*c.length)];

const r=results[winner];

result-title.innerText=r.t;
result-desc.innerText=r.d;
result-img.src=r.i;

setTimeout(()=>imgWrap.classList.add('active'),200);

ctaText.innerText=getCTA(winner);
renderStats();
}

function renderStats(){
const total=Object.values(scores).reduce((a,b)=>a+b,0);
result-stats.innerHTML="";
Object.entries(scores).sort((a,b)=>b[1]-a[1]).slice(0,3)
.forEach(([n,s])=>{
const p=Math.round(s/total*100);
result-stats.innerHTML+=`<div>${n} ${p}%</div>`;
});
}

function getCTA(name){
const map={
"원창":"당신처럼 이끄는 선택의 결말을 확인하세요",
"만철":"살아남는 선택의 끝을 보세요",
"명숙":"지키는 선택의 결과는?",
"선녀":"현실적 선택의 대가를 확인하세요",
"영호":"끝까지 고민한 선택의 결말은?"
};
return map[name]||"이 인물의 결말을 직접 확인해보세요";
}

// 공유 & 썸네일
function downloadShare(){
shareFill(false);
share-card.style.display='block';
html2canvas(share-card).then(c=>{
const a=document.createElement('a');
a.href=c.toDataURL(); a.download='result.png'; a.click();
share-card.style.display='none';
});
}

function generateThumbnail(){
shareFill(true);
thumb.style.display='block';
html2canvas(thumb,{scale:2}).then(c=>{
const a=document.createElement('a');
a.href=c.toDataURL(); a.download='thumb.png'; a.click();
thumb.style.display='none';
});
}

function shareFill(isThumb){
const t=result-title.innerText;
const d=result-desc.innerText;
const i=result-img.src;

if(isThumb){
thumb-title.innerText=t;
thumb-desc.innerText=d;
thumb-img.src=i;
}else{
share-title.innerText=t;
share-desc.innerText=d;
share-img.src=i;
}
}

</script>

</body>
</html>
```
