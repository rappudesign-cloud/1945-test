<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <meta property="og:url" content="https://your-vercel-app-link.vercel.app" />
    <meta property="og:title" content="나와 닮은 <1945> 캐릭터는?" />
    <meta property="og:description" content="2026 동서대학교 연기과 정기 워크숍" />
    <meta property="og:image" content="https://your-vercel-app-link.vercel.app/images/thumb.jpg" />
    <meta property="og:type" content="website" />

    <title>나와 닮은 <1945> 캐릭터는?</title>

    <link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700;800&family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        /* 포스터의 빛바랜 종이 질감과 색감 적용 */
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: #ede9e3; /* 포스터의 베이지 톤 */
            background-image: url('https://www.transparenttextures.com/patterns/paper-fibers.png'); /* 질감 추가 */
        }

        .serif {
            font-family: 'Nanum Myeongjo', serif;
        }

        /* 포스터의 '1945' 숫자처럼 거친 느낌을 주는 타이틀 스타일 */
        .title-grunge {
            font-family: 'Nanum Myeongjo', serif;
            letter-spacing: 0.1em;
            color: #2c2a26; /* 포스터 숫자의 짙은 톤 */
            font-weight: 800;
            position: relative;
        }

        /* 포스터의 서정적인 세로 문구 스타일 */
        .poster-quote {
            writing-mode: vertical-rl;
            text-orientation: mixed;
            letter-spacing: 0.15em;
            line-height: 1.8;
            color: #656057; /* 포스터 문구의 회갈색 톤 */
            font-size: 0.8rem;
        }

        /* 퀴즈 카드 디자인: 포스터의 정갈한 느낌 */
        .poster-card {
            background-color: #fdfcf8;
            border: 1px solid #d6d0c4;
            box-shadow: 0 15px 30px rgba(0,0,0,0.1);
            position: relative;
            padding: 2rem;
            display: none; /* 기본 숨김 */
        }

        /* 시작 화면은 보이게 설정 */
        #start { display: flex; flex-direction: column; align-items: center; text-align: center; }

        /* 포스터의 이중 테두리 디테일 */
        .poster-card::after {
            content: '';
            position: absolute;
            inset: 8px;
            border: 1px solid #d6d0c4;
            pointer-events: none;
        }

        /* 버튼 스타일: 포스터의 짙은 베이지/갈색 톤 */
        .btn-vintage {
            background-color: #b5ada1;
            color: white;
            transition: 0.2s;
            cursor: pointer;
            position: relative;
            z-index: 10;
        }
        .btn-vintage:hover {
            background-color: #9f9689;
            transform: translateY(-2px);
        }

        /* 선택지 스타일: 고전적이고 정갈하게 */
        .answer-vintage {
            width: 100%;
            border: 1px solid #ccc;
            padding: 16px;
            margin-bottom: 12px;
            transition: 0.2s;
            text-align: left;
            background-color: white;
            cursor: pointer;
            position: relative;
            z-index: 10;
            font-size: 0.95rem;
            line-height: 1.6;
        }
        .answer-vintage:hover {
            border-color: #b5ada1;
            background-color: #fdf5f5;
        }

        /* 진행 바 스타일: 포스터 톤 */
        .progress-container {
            width: 100%;
            height: 3px;
            background-color: #e5e7eb;
            margin-bottom: 25px;
            position: relative; z-index: 10;
        }
        .progress-bar {
            height: 100%;
            background-color: #b5ada1;
            width: 0%;
            transition: width 0.3s ease;
        }

        /* 결과 이미지 연출: 포스터 흑백 느낌 */
        .img-wrap img {
            filter: grayscale(100%);
            transition: 0.8s;
            object-fit: cover;
        }
        .img-wrap.active img {
            filter: grayscale(0%);
            transform: scale(1.02);
        }

    </style>
</head>

<body class="flex justify-center items-center min-h-screen p-4">

<div class="w-full max-w-md">

    <div id="start" class="poster-card">
        <div class="flex flex-col items-center mb-8">
            <p class="poster-quote serif">우리는 왜 그렇게 서둘렀을까<br>아무것도 확실하지 않은 곳을 향해</p>
        </div>
        <h1 class="title-grunge text-6xl mb-12">1 9 4 5</h1>
        <p class="text-sm tracking-widest text-gray-500 mb-10 serif">2026 동서대학교 연기과 정기 워크숍</p>
        <button onclick="startQuiz()" class="btn-vintage w-full py-4 text-lg font-bold rounded-sm shadow">
            테스트 시작하기
        </button>
    </div>

    <div id="quiz" class="poster-card">
        <div class="flex justify-between items-end mb-2 relative z-10">
            <span id="progress-text" class="text-xs text-gray-500 font-bold serif"></span>
            <span class="text-xs text-gray-400">1945 캐릭터 테스트</span>
        </div>
        <div class="progress-container">
            <div id="progress-bar" class="progress-bar"></div>
        </div>

        <h2 id="question" class="serif mb-10 text-xl font-bold leading-snug text-stone-800"></h2>
        <div id="answers"></div>
    </div>

    <div id="result" class="poster-card text-center">
        <p class="text-xs text-gray-500 mb-2">나와 닮은 인물은</p>
        <h1 id="result-title" class="title-grunge text-3xl mb-8"></h1>
        
        <div class="img-wrap mb-6 overflow-hidden rounded shadow-lg" id="imgWrap">
            <img id="result-img" class="w-full aspect-square">
        </div>

        <p id="result-desc" class="desc mb-8 text-left text-sm p-4 bg-stone-100 border-l-4 border-[#b5ada1]"></p>
        
        <a href="https://forms.gle/hQindGxBDH64uSWC8" target="_blank" class="btn-vintage block py-3 mb-2 text-center no-underline font-bold rounded-sm">
            🎟 [인물 이름]의 운명 확인하기
        </a>
        <button onclick="location.reload()" class="w-full border py-2 text-sm text-gray-400 hover:bg-gray-100 rounded-sm">
            다시하기
        </button>
    </div>

</div>

<script>
    const questions = [
        {q:"낯선 땅 만주, 황량한 구제소에 발을 내디뎠다. 가장 먼저 무엇을 하겠는가?",a:[{t:"규칙과 지형을 빠르게 파악하고 식량 확보",p:"만철"},{t:"사람들을 진정시키고 체계적 질서 확립",p:"최주임"},{t:"가족들이 다치지 않게 품에 안기",p:"순남"},{t:"눈에 띄지 않게 숨어 상황 지켜보기",p:"미즈코"}]},
        {q:"구제소 내 소동 발생. 누군가 내 물건에 손을 댄 것 같다면?",a:[{t:"단호하고 압도적인 힘으로 제압",p:"보안대원"},{t:"오해일 것이다, 대화로 중재",p:"원창"},{t:"이 갈등을 이용해 얻을 이득 계산",p:"선녀"},{t:"사람들 떼어놓으며 궂은일 돕기",p:"훈이"}]},
        {q:"살아남기 위해 가장 중요하게 지켜야 할 가치는?",a:[{t:"억척스럽게 버텨내는 끈질긴 생명력",p:"끝순"},{t:"잃지 말아야 할 인간의 신념", p:"영호"},{t:"가족의 정",p:"이노인"},{t:"내 사람을 끝까지 책임지는 것",p:"명숙"}]},
        {q:"누군가 내 과거를 의심하며 날카로운 질문을 던진다면?",a:[{t:"지식과 언변으로 상대를 설득",p:"원창"},{t:"강압적으로 압박하여 입 막기",p:"장씨"},{t:"아무 말도 하지 못한 채 고개 떨구기",p:"미즈코"},{t:"나에게 유리하게 정보 흘리기",p:"선녀"}]},
        {q:"조국 행 기차가 도착했다. 하지만 자리가 턱없이 부족하다면?",a:[{t:"기차에 먼저 올라 가족 자리 선점",p:"만철"},{t:"나보다 더 힘든 이에게 양보",p:"명숙"},{t:"가족들의 손을 꼭 잡고 낙오 챙기기",p:"순남"},{t:"효율적으로 누구를 태울지 판단",p:"최주임"}]},
        {q:"지치고 배고픈 아이들이 당신을 붙잡는다면?",a:[{t:"다정하게 안아주고 다독이기",p:"숙이"},{t:"아껴둔 주먹밥 슬쩍 쥐여주기",p:"옥이"},{t:"내 코가 석 자, 아이들 외면",p:"끝순"},{t:"시끄럽지 않게 무섭게 쫓아내기",p:"장씨"}]},
        {q:"어두운 과거의 비밀이 나를 괴롭힌다. 어떻게 대처하겠는가?",a:[{t:"이름까지 바꾸고 철저히 새 삶",p:"유코"},{t:"묵묵히 가슴 속에 묻고 견디기",p:"이노인"},{t:"비밀 알려지더라도 정면돌파",p:"명숙"},{t:"배불리 먹는 것이 더 중요",p:"만철"}]},
        {q:"희생과 나의 안위가 충돌하는 결정적 순간, 당신은?",a:[{t:"나 한 몸 기꺼이 희생할 각오",p:"원창"},{t:"각자도생, 오직 나의 생존",p:"선녀"},{t:"동료들과 끝까지 의리 지키기",p:"훈이"},{t:"어떤 선택이 옳은지 끊임없이 고뇌",p:"영호"}]}
    ];

    const results = {
        "원창":{t:"원창형 인간",d:"지식을 나누며 공동체의 리더가 되었던 원창처럼, 당신은 희망을 버리지 않는 고결한 사람입니다.",i:"/images/wonchang.jpg"},
        "순남":{t:"순남형 인간",d:"가족을 지키기 위해 척박한 수용소를 견뎌낸 순남처럼, 당신은 생활력이 강하고 따뜻합니다.",i:"/images/soonnam.jpg"},
        "명숙":{t:"명숙형 인간",d:"남남일지라도 내 사람이라 생각하면 끝까지 지키는 강인한 수호자입니다.",i:"/images/myeongsook.jpg"},
        "미즈코":{t:"미즈코형 인간",d:"명숙에게 의지하며 벙어리 행세를 해서라도 살아남으려 했던, 불안 속 생존 의지가 강한 사람입니다.",i:"/images/mizuko.jpg"},
        "만철":{t:"만철형 인간",d:"가족의 실속을 최우선으로 챙기는, 기민한 상황 판단력을 가진 현실 전략가입니다.",i:"/images/mancheol.jpg"},
        "끝순":{t:"끝순형 인간",d:"지옥 같은 수용소에서도 결코 꺾이지 않는, 잡초 같은 생명력을 가진 당신은 억척스럽게 강합니다.",i:"/images/kkeutsoon.jpg"},
        "선녀":{t:"선녀형 인간",d:"도덕보다 눈앞의 실리를 위해 움직이는 승부사입니다.",i:"/images/seonnyeo.jpg"},
        "장씨":{t:"장씨형 인간",d:"타인을 엄격하게 심판하지만, 결국 자신도 미래의 어려움 앞에 무너지는 인간적인 모순이 있습니다.",i:"/images/jangssi.jpg"},
        "이노인":{t:"이노인형 인간",d:"고향 땅을 밟겠다는 일념 하나로 세월을 견디는 당신은 우리 시대의 산증인입니다.",i:"/images/leenoin.jpg"},
        "숙이":{t:"숙이형 인간",d:"부모님을 돕고 동생을 챙기며, 어둠 속에서도 빛을 찾아내는 긍정적인 사람입니다.",i:"/images/soogi.jpg"},
        "옥이":{t:"옥이형 인간",d:"가족의 웃음을 책임지는 순수한 영혼입니다.",i:"/images/oki.jpg"},
        "훈이":{t:"훈이형 인간",d:"남의 일도 내 일처럼 돕고 끝까지 함께하는, 이 험한 세상에 꼭 필요한 친구입니다.",i:"/images/hooni.jpg"},
        "영호":{t:"영호형 인간",d:"끊임없이 '인간이란 무엇인가' 질문을 던지는, 고뇌하는 정직한 영혼입니다.",i:"/images/youngho.jpg"},
        "최주임":{t:"최주임형 인간", d:"변화하는 상황 속에서 질서를 유지하려 애쓰는 기민한 관리자입니다.",i:"/images/choijuim.jpg"},
        "보안대원":{t:"질서형 인간", d:"혼란을 막기 위해 규율을 철저히 집행하는 냉정한 원칙주의자입니다.",i:"/images/boan.jpg"},
        "유코":{t:"유코형 인간",d:"과거의 굴레에서 벗어나기 위해 처절하게 새 삶을 일구는 처절한 사람입니다.",i:"/images/yuko.jpg"}
    };

    let currentIndex=0;
    let scores={};

    function startQuiz(){
        document.getElementById('start').style.display='none';
        document.getElementById('quiz').style.display='block';
        showQ();
    }

    function showQ(){
        const q=questions[currentIndex];
        const total = questions.length;
        document.getElementById('progress-text').innerText = `${currentIndex + 1} / ${total}`;
        document.getElementById('progress-bar').style.width = `${((currentIndex + 1) / total) * 100}%`;
        
        document.getElementById('question').innerText=q.q;
        const box=document.getElementById('answers');
        box.innerHTML="";

        q.a.forEach(answer=>{
            const b=document.createElement('button');
            b.innerText=answer.t;
            b.className="answer-vintage rounded";
            b.onclick=function(){ next(answer.p); };
            box.appendChild(b);
        });
    }

    function next(person){
        scores[person]=(scores[person]||0)+1;
        currentIndex++;

    if(currentIndex < questions.length){
        showQ();
    }else{
        showResult();
    }
}

function showResult(){
    document.getElementById('quiz').style.display='none';
    document.getElementById('result').style.display='block';

    const keys=Object.keys(scores);
    // 가장 높은 점수를 가진 인물 찾기 (간단한 동점 처리 포함)
    let winner = keys.reduce((a, b) => (scores[a] || 0) > (scores[b] || 0) ? a : b, keys[0]);
    const r=results[winner];

    document.getElementById('result-title').innerText=r.t;
    document.getElementById('result-desc').innerText=r.d;
    document.getElementById('result-img').src=r.i;

    // 버튼 문구 개인화 및 예매 링크 연결
    const reservationBtn = document.querySelector('a[href^="https://forms.gle"]');
    reservationBtn.innerText = `🎟 [${winner}]의 운명 무대에서 목격하기`;

    setTimeout(()=>{
        document.getElementById('imgWrap').classList.add('active');
    },300);
}
</script>

</body>
</html>
