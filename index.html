let currentIndex=0;
let scores={};

function startQuiz(){
    document.getElementById('start').style.display='none';
    document.getElementById('quiz').style.display='block';
    showQ();
}

function showQ(){
    const q=questions[currentIndex];
    
    // 진행 정보 업데이트
    const total = questions.length;
    document.getElementById('progress-text').innerText = `${currentIndex + 1} / ${total}`;
    document.getElementById('progress-bar').style.width = `${((currentIndex + 1) / total) * 100}%`;
    
    document.getElementById('question').innerText=q.q;

    const box=document.getElementById('answers');
    box.innerHTML="";

    q.a.forEach(answer=>{
        const b=document.createElement('button');
        b.innerText=answer.t;
        b.className="answer";
        b.onclick=function(){ next(answer.p); };
        box.appendChild(b);
    });
}

function next(person){
    scores[person]=(scores[person]||0)+1;
    currentIndex++;

    if(currentIndex < questions.length){
        showQ();
    }else{
        showResult();
    }
}

function showResult(){
    document.getElementById('quiz').style.display='none';
    document.getElementById('result').style.display='block';

    const keys=Object.keys(scores);
    // 가장 높은 점수를 가진 인물 찾기
    let winner = keys.reduce((a, b) => (scores[a] || 0) > (scores[b] || 0) ? a : b);

    const r=results[winner];

    document.getElementById('result-title').innerText=r.t;
    document.getElementById('result-desc').innerText=r.d;
    document.getElementById('result-img').src=r.i;
    document.getElementById('cta-text').innerText=ctaMap[winner];

    // 버튼 문구 개인화
    const reservationBtn = document.querySelector('a[href^="https://forms.gle"]');
    reservationBtn.innerText = `🎟 무대 위 ${winner}의 운명 확인하기`;

    setTimeout(()=>{
        document.getElementById('imgWrap').classList.add('active');
    },200);
}
</script>

</body>
</html>
