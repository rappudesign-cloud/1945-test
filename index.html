<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>희곡 1945 인물 테스트</title>
    <link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700;800&family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #f5f5f0; color: #2c2c2c; }
        .serif { font-family: 'Nanum Myeongjo', serif; }
        .vintage-border { border: 1px solid #d1d1c1; position: relative; }
        .vintage-border::after { content: ''; position: absolute; top: 4px; left: 4px; right: 4px; bottom: 4px; border: 1px solid #d1d1c1; pointer-events: none; }
        .bg-grain { background-image: url('https://www.transparenttextures.com/patterns/paper.png'); }
        .btn-hover:hover { transform: translateY(-2px); transition: all 0.2s; }
    </style>
</head>
<body class="bg-grain min-h-screen flex items-center justify-center p-4">

    <div id="app" class="max-w-md w-full bg-[#fdfdfb] p-8 shadow-2xl vintage-border text-center">
        <div id="start-screen">
            <h2 class="text-stone-500 text-sm tracking-widest mb-2">2026 정기공연</h2>
            <h1 class="serif text-5xl font-extrabold text-red-900 mb-6">1 9 4 5</h1>
            <p class="text-stone-600 mb-8 leading-relaxed">
                해방 직후 만주 전재민 구제소,<br>
                당신은 어떤 선택을 하며 살아남았을까요?
            </p>
            <button onclick="startQuiz()" class="btn-hover w-full py-4 bg-red-900 text-white serif text-xl font-bold rounded-sm shadow-lg">
                테스트 시작하기
            </button>
        </div>

        <div id="quiz-screen" class="hidden">
            <div class="w-full bg-stone-200 h-1 mb-10">
                <div id="progress" class="bg-red-900 h-1 transition-all duration-300" style="width: 20%"></div>
            </div>
            <h2 id="question" class="serif text-2xl font-bold mb-10 leading-snug text-stone-800">질문 내용</h2>
            <div id="answers" class="space-y-4">
                </div>
        </div>

        <div id="result-screen" class="hidden">
            <h3 class="text-stone-500 text-sm mb-2">당신과 닮은 인물은</h3>
            <h1 id="result-title" class="serif text-4xl font-black text-red-900 mb-6">인물 이름</h1>
            <div class="bg-stone-200 w-full aspect-square mb-6 overflow-hidden rounded-sm grayscale hover:grayscale-0 transition-all duration-700">
                <img id="result-img" src="" alt="캐릭터 사진" class="w-full h-full object-cover">
            </div>
            <p id="result-desc" class="text-stone-700 leading-relaxed mb-8 text-left p-4 bg-stone-50 border-l-4 border-red-900">
                인물 상세 설명
            </p>
            
            <div class="border-t border-stone-200 pt-6">
                <p class="text-sm text-stone-500 mb-4">나와 이 인물이 비슷한 이유가 궁금하다면?</p>
                <a href="https://forms.gle/hQindGxBDH64uSWC8" target="_blank" class="inline-block w-full py-3 bg-stone-800 text-white font-bold rounded-sm hover:bg-black transition">
                    공연 예매하러 가기
                </a>
            </div>
        </div>
    </div>

    <script>
        const questions = [
            {
                q: "갑자기 낯선 곳에 홀로 남겨졌을 때, 나의 행동은?",
                a: [
                    { t: "주변을 파악하고 생존에 필요한 물건부터 챙긴다.", p: "만철" },
                    { t: "사람들을 모아 대책을 논의하고 역할을 나눈다.", p: "원창" },
                    { t: "일단 숨어서 상황이 어떻게 돌아가는지 지켜본다.", p: "미즈코" },
                    { t: "이곳의 규칙을 빨리 파악해 나에게 유리한 상황을 만든다.", p: "선녀" }
                ]
            },
            {
                q: "소중한 사람이 큰 잘못을 저질러 위기에 처했다면?",
                a: [
                    { t: "비난하지 않고 어떻게든 수습해 사람을 먼저 살린다.", p: "명숙" },
                    { t: "공동체를 위해 냉정하지만 엄격하게 책임을 묻는다.", p: "장씨" },
                    { t: "무섭지만 묵묵히 그 사람의 곁을 지킨다.", p: "순남" },
                    { t: "나에게 피해가 오기 전에 거리를 두고 상황을 본다.", p: "끝순" }
                ]
            },
            {
                q: "내가 인생에서 가장 중요하게 생각하는 가치는?",
                a: [
                    { t: "어떤 풍파 속에서도 꺾이지 않는 강한 생존력", p: "만철" },
                    { t: "정의로운 사회를 위한 지식과 교육의 힘", p: "원창" },
                    { t: "사랑하는 가족과 함께하는 평범한 하루", p: "순남" },
                    { t: "현실적인 이득과 내 사람을 챙기는 실속", p: "선녀" }
                ]
            },
            {
                q: "누군가 나에 대한 억울한 소문을 퍼뜨린다면?",
                a: [
                    { t: "당당하게 나서서 논리적으로 소문이 틀렸음을 알린다.", p: "원창" },
                    { t: "비밀이 새어나가지 않도록 철저히 침묵하고 숨는다.", p: "명숙" },
                    { t: "강하게 맞서서 나를 건드리지 못하게 만든다.", p: "장씨" },
                    { t: "내 사람들에게만 진실을 말하고 견뎌낸다.", p: "훈이" }
                ]
            },
            {
                q: "드디어 고향으로 가는 기차가 도착했을 때 나의 기분은?",
                a: [
                    { t: "가장 먼저 타기 위해 짐부터 빠르게 챙긴다.", p: "만철" },
                    { t: "가족들과 친구들을 빠짐없이 챙겼는지 확인한다.", p: "원창" },
                    { t: "과거를 뒤로하고 새로운 삶을 시작할 생각에 설렌다.", p: "명숙" },
                    { t: "기쁘지만 또 다른 시련이 올까 봐 걱정부터 앞선다.", p: "끝순" }
                ]
            }
        ];

 const results = {
    "원창": { t: "이상적인 지식인, 원창", d: "한글 강습회를 열었던 원창처럼 당신은 공동체의 미래를 고민하는 리더입니다. 지식을 나누며 희망을 찾는 모습이 닮았네요.", i: "http://bit.ly/4cAsD2w" },
    "순남": { t: "가족을 지키는 강인함, 순남", d: "원창의 아내이자 명숙의 친구인 당신. 피 한 방울 안 섞인 이들과도 가족이 되는 따뜻함과 생활력이 돋보입니다.", i: "https://bit.ly/4mSnRAD" },
    "명숙": { t: "비밀을 품은 수호자, 명숙", d: "과거의 아픔을 숨기고 미즈코를 지키려는 당신. 겉은 차가워 보이지만 속은 누구보다 뜨거운 책임감을 가졌습니다.", i: "https://bit.ly/4tJEmlh" },
    "미즈코": { t: "경계에 선 이방인, 미즈코", d: "명숙의 보호 아래 숨죽여 지내는 당신. 불안한 상황 속에서도 살아남으려 애쓰는 모습이 보호 본능을 자극합니다.", i: "https://bit.ly/4ebjfU1" },
    "만철": { t: "현실적인 생존 전략가, 만철", d: "이노인의 아들로서 가족의 생존을 최우선으로 합니다. 세상 물정에 밝고 기민하게 움직이는 현실파입니다.", i: "https://bit.ly/4eJ3sfh" },
    "끝순": { t: "지독한 생활력의 소유자, 끝순", d: "만철의 아내로, 척박한 구제소 생활을 억척스럽게 버텨냅니다. 당신의 끈질긴 생존력이 곧 가족의 힘입니다.", i: "https://zrr.kr/kACTvt" },
    "선녀": { t: "아편에 취한 과거의 망령, 선녀", d: "위안소 포주였던 과거와 아편 중독의 고통을 안고 사는 당신. 거칠고 날카롭지만 그 이면엔 시대의 비극이 서려 있습니다.", i: "https://zrr.kr/IuV4ns" },
    "장씨": { t: "검열하는 민족주의자, 장씨", d: "선녀의 연인. 타인을 엄격하게 검열하지만 정작 본인은 장질부사라는 시련을 맞이하는 입체적인 인물입니다.", i: "https://zrr.kr/v67C5W" },
    "이노인": { t: "세월을 견디는 어른, 이노인", d: "만철의 어머니. 무너진 시대의 질서 속에서도 고향 땅을 밟겠다는 일념 하나로 버티는 우리 시대의 뿌리입니다.", i: "https://zrr.kr/GzTyOG" },
    "숙이": { t: "희망을 품은 첫째 딸, 숙이", d: "원창과 순남의 큰딸. 혼란스러운 구제소 안에서도 꿋꿋하게 자라나는 우리들의 미래입니다.", i: "https://zrr.kr/DICZ7E" },
    "옥이": { t: "귀여운 막내 딸, 옥이", d: "원창과 순남의 둘째 딸. 험난한 여정 속에서도 가족들에게 미소를 찾아주는 보물 같은 존재입니다.", i: "https://zrr.kr/HVl6HJ" },
    "훈이": { t: "의리 넘치는 청년, 훈이", d: "원창의 절친한 친구. 남의 일도 내 일처럼 돕는 당신은 삭막한 구제소의 든든한 버팀목입니다.", i: "https://zrr.kr/QNJdTt" },
    "영호": { t: "고뇌하는 청년, 영호", d: "수용소의 비극을 목격하며 끊임없이 질문을 던지는 당신. 시대의 아픔을 외면하지 않는 정직한 영혼입니다.", i: "https://zrr.kr/kT1d1l" },
    "최주임": { t: "기민한 관리자, 최주임", d: "구제소의 책임자로서 권력의 흐름을 빠르게 읽습니다. 질서와 실리 사이에서 균형을 잡는 능력이 탁월합니다.", i: "https://zrr.kr/dqWJwu" },
    "보안대원": { t: "냉정한 규율의 집행자", d: "구제소의 질서를 유지하려 애쓰는 인물. 때로는 강압적이지만 혼란을 막으려는 당신만의 방식이 있습니다.", i: "https://zrr.kr/dqWJwu" },
    "유코": { t: "버려진 이들의 슬픔, 유코", d: "미즈코의 정체를 흔드는 긴장감의 주인공. 시대에 버림받은 이들의 비참함과 처절함을 상징적으로 보여줍니다.", i: "https://zrr.kr/J8OoHI" }
};

        let currentQ = 0;
        let scores = {};

        function startQuiz() {
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('quiz-screen').classList.remove('hidden');
            showQuestion();
        }

        function showQuestion() {
            const q = questions[currentQ];
            document.getElementById('question').innerText = q.q;
            document.getElementById('progress').style.width = ((currentQ + 1) / questions.length * 100) + "%";
            
            const ansDiv = document.getElementById('answers');
            ansDiv.innerHTML = "";
            q.a.forEach(answer => {
                const btn = document.createElement('button');
                btn.className = "w-full p-4 text-left border border-stone-300 rounded-sm hover:bg-stone-100 hover:border-stone-800 transition btn-hover text-sm";
                btn.innerText = answer.t;
                btn.onclick = () => nextQuestion(answer.p);
                ansDiv.appendChild(btn);
            });
        }

        function nextQuestion(person) {
            scores[person] = (scores[person] || 0) + 1;
            currentQ++;
            if (currentQ < questions.length) {
                showQuestion();
            } else {
                showResult();
            }
        }

        function showResult() {
            document.getElementById('quiz-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');
            
            const winner = Object.keys(scores).reduce((a, b) => scores[a] > scores[b] ? a : b);
            const result = results[winner] || results["원창"];
            
            document.getElementById('result-title').innerText = result.t;
            document.getElementById('result-desc').innerText = result.d;
            document.getElementById('result-img').src = result.i;
        }
    </script>
</body>
</html>
